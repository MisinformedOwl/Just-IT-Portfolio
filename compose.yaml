version: '3.8'

services:
  Scraper:
    build:
      context: .
    ports:
      - 8000:8000
    environment:
      - ENVIRONMENT=production
    env_file:
      - .env
    restart: unless-stopped
    container_name: linkedin_scraper
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3